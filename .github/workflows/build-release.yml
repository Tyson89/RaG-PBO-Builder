name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build release package
        shell: pwsh
        run: |
          .\package_release.ps1

      - name: Check release readiness
        shell: pwsh
        run: |
          .\check_release_ready.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RaG-PBO-Tools-Installer
          path: |
            dist/installer/RaG_PBO_Tools_Setup.exe
            dist/installer/RaG_PBO_Tools_Setup.exe.sha256

      - name: Upload GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Tag = $env:GITHUB_REF_NAME
          $Installer = Get-Item -LiteralPath "dist/installer/RaG_PBO_Tools_Setup.exe" -ErrorAction SilentlyContinue
          $InstallerHash = Get-Item -LiteralPath "dist/installer/RaG_PBO_Tools_Setup.exe.sha256" -ErrorAction SilentlyContinue
          if (-not $Installer -or -not $InstallerHash) {
            throw "Installer or checksum was not created."
          }

          $Assets = @($Installer.FullName, $InstallerHash.FullName)
          gh release view $Tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $Tag @Assets --clobber
          } else {
            gh release create $Tag @Assets --title $Tag --notes "Windows installer for RaG PBO Builder and RaG PBO Inspector."
          }
